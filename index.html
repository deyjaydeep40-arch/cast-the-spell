<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Witch's Coven - Character Reader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Particle Canvas for Spell Dust -->
    <canvas id="magic-canvas"></canvas>
    <div id="bg-overlay" class="bg-overlay"></div>

    <div class="game-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <div class="witch-portrait crystal-ball">
      
            </div>
            <div class="genie-icon">🔮</div>
            <h1>The Witch's Coven</h1>
            <p>Think of a character, and the dark spirits will reveal their identity through my crystal ball...</p>
            <button id="start-btn" class="btn primary-btn">Consult the Spirits</button>
        </div>

        <!-- Question Screen -->
        <div id="question-screen" class="screen hidden">
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="question-box">
                <p id="question-number">Incantation I</p>
                <h2 id="question-text">Summoning question...</h2>
            </div>
            <div class="options-container">
                <button class="btn option-btn" data-answer="yes">Yes, it is true</button>
                <button class="btn option-btn" data-answer="no">No, false</button>
                <button class="btn option-btn" data-answer="maybe">Uncertain / Perhaps</button>
            </div>
            <!-- Dynamic warning text for the anti-cheat mechanics -->
            <p id="cheat-warning" class="warning-text hidden">⚠️ The spirits sense deception... your choices contradict!</p>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen hidden">
            <div class="witch-portrait guess-portrait crystal-ball">
                <img id="result-portrait" src="https://unsplash.com" alt="The Revealed One">
            </div>
            <div class="genie-icon animate-pulse">✨</div>
            <h2 id="result-heading">The spirits whisper...</h2>
            <h1 id="guess-name">Character Name</h1>
            <p id="guess-description">Character description goes here.</p>
            <div class="result-actions">
                <button id="restart-btn" class="btn primary-btn">Cast Another Spell</button>
            </div>
        </div>
    </div>

    <audio id="sound-click" src="https://mixkit.co" preload="auto"></audio>
    <audio id="sound-magic" src="https://mixkit.co" preload="auto"></preload>
    <script src="script.js"></script>
</body>
</html>
